name: Deploy Database

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v3
        with:
          version: 2.84.2
      - name: Verify deployment secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "SUPABASE_ACCESS_TOKEN is missing" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "SUPABASE_DB_PASSWORD is missing" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "SUPABASE_PROJECT_ID is missing" && exit 1)
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Push database migrations
        run: supabase db push --linked
