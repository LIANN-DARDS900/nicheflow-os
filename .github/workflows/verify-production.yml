name: Verify Production

on:
  workflow_dispatch:
    inputs:
      production_url:
        description: "Full deployed URL, for example https://nicheflow-os.vercel.app"
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify live Supabase-backed deployment
        env:
          PRODUCTION_URL: ${{ inputs.production_url }}
        run: node scripts/verify-production.mjs
